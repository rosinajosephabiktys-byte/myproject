<!DOCTYPE html>
<html>
<head>
<title>Simple Calculator</title>

<script>

function calculate(type){

let num1 = Number(document.getElementById("num1").value);
let num2 = Number(document.getElementById("num2").value);

let result;

if(type=="add")
result = num1 + num2;

if(type=="sub")
result = num1 - num2;

if(type=="mul")
result = num1 * num2;

if(type=="div")
result = num1 / num2;

document.getElementById("result").innerHTML = "Result: " + result;

}

</script>

</head>

<body>

<h1>Simple Calculator</h1>

<input id="num1" placeholder="Number 1">
<input id="num2" placeholder="Number 2">

<br><br>

<button onclick="calculate('add')">Add</button>
<button onclick="calculate('sub')">Subtract</button>
<button onclick="calculate('mul')">Multiply</button>
<button onclick="calculate('div')">Divide</button>

<p id="result"></p>

<br>

<a href="tools.html">Back</a>

</body>
</html>
